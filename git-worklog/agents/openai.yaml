# Agent / host manifest for the Git Worklog skill.
#
# Subagent provider/model selection is NOT defined here. It lives in a single
# machine-readable source — config/provider_models.json — resolved per host by
# scripts/resolve_provider_model.py. This keeps one source of truth so the YAML,
# references, and scripts can never drift to different model names.

name: git-worklog
display_name: Git Worklog
description: >-
  Generate evidence-based engineering worklogs, reports, changelogs, handoff
  summaries, contribution reports, and technical-debt reviews from actual Git
  history and source-code changes.
version: 0.4.0

# The skill body is the control layer; this manifest only carries metadata.
entrypoint: SKILL.md
command: /git-worklog

ui:
  category: developer-tools
  icon: 📓
  summary: Per-day project worklog from real Git diffs and code, and reports from it.
  keywords:
    - worklog
    - work log
    - changelog
    - release notes
    - git history
    - handoff
    - weekly summary
    - 工作日誌
    - 工作摘要
    - 週報

# Subagent model selection per host — SINGLE SOURCE OF TRUTH is the JSON below,
# resolved by scripts/resolve_provider_model.py. Defaults prioritise cost
# efficiency for bounded per-day analysis (anthropic: Claude Haiku 4.5, openai:
# GPT-5.6 Luna @ low effort, google: Gemini 3.5 Flash). On an unavailable model
# the skill halts and asks — it never silently swaps to a pricier model,
# auto-picks another, or degrades to commit-message-only. See that file's
# model_unavailable_policy and references/provider-models.md.
model_config: config/provider_models.json

# Presentation shown when the user invokes /git-worklog with no arguments.
default_prompt: |
  請選擇要整理的專案工作日誌範圍：

  1. 今天
  2. 指定日期
  3. 最近 7 天
  4. 最近 30 天
  5. 自訂日期範圍
  6. 今天，並包含尚未提交的異動
  7. 自訂日期或範圍，並包含尚未提交的異動

  日期範圍最多為 30 天。
  所有操作都會先顯示 dry-run 預覽，不會直接修改專案檔案。

capabilities:
  reads_git_history: true
  reads_source_code: true
  writes_files:
    - PROJECT_WORKLOG/index.md
    - PROJECT_WORKLOG/<date>.md
  never_runs:
    - git add
    - git commit
    - git push
    - git fetch
    - git pull
    - git checkout
    - git switch
    - git merge
    - git rebase
  # The 30-day cap bounds per-day subagent cost, so it governs worklog
  # generation and gap backfill. Report mode only reads day files already on
  # disk and spawns no subagents, so it reads further — a context bound, not a
  # cost one. See references/report-mode.md.
  max_range_days: 30
  max_report_range_days: 90
  default_include_uncommitted: false
  # Every write previews first and needs explicit confirmation. Report mode
  # writes nothing, so it has no dry-run to confirm.
  always_dry_run_before_write: true
  read_only_report_mode: true
