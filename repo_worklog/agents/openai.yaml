# Agent / host manifest for the repo_worklog skill.
#
# Subagent provider/model selection is NOT defined here. It lives in a single
# machine-readable source — config/provider_models.json — resolved per host by
# scripts/resolve_provider_model.py. This keeps one source of truth so the YAML,
# references, and scripts can never drift to different model names.

name: repo_worklog
display_name: Repository Worklog
description: >-
  Analyze Git commits and source code by day, then preview and maintain a
  project worklog.
version: 0.2.0

# The skill body is the control layer; this manifest only carries metadata.
entrypoint: SKILL.md
command: /repo_worklog

ui:
  category: developer-tools
  icon: 📓
  summary: Per-day project worklog from real Git diffs and code.
  keywords:
    - worklog
    - work log
    - changelog
    - git history
    - handoff
    - 工作日誌

# Subagent model selection per host — SINGLE SOURCE OF TRUTH is the JSON below,
# resolved by scripts/resolve_provider_model.py. Defaults prioritise cost
# efficiency for bounded per-day analysis (anthropic: Claude Haiku 4.5, openai:
# GPT-5.6 Luna @ low effort, google: Gemini 3.5 Flash). On an unavailable model
# the skill halts and asks — it never silently swaps to a pricier model,
# auto-picks another, or degrades to commit-message-only. See that file's
# model_unavailable_policy and references/provider-models.md.
model_config: config/provider_models.json

# Presentation shown when the user invokes /repo_worklog with no arguments.
default_prompt: |
  請選擇要整理的專案工作日誌範圍：

  1. 今天
  2. 指定日期
  3. 最近 7 天
  4. 最近 30 天
  5. 自訂日期範圍
  6. 今天，並包含尚未提交的異動
  7. 自訂日期或範圍，並包含尚未提交的異動

  日期範圍最多為 30 天。
  所有操作都會先顯示 dry-run 預覽，不會直接修改專案檔案。

capabilities:
  reads_git_history: true
  reads_source_code: true
  writes_files:
    - PROJECT_WORKLOG/index.md
    - PROJECT_WORKLOG/<date>.md
  never_runs:
    - git add
    - git commit
    - git push
    - git fetch
    - git pull
    - git checkout
    - git switch
    - git merge
    - git rebase
  max_range_days: 30
  default_include_uncommitted: false
  always_dry_run_first: true
