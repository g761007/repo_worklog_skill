name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the documented floor (zoneinfo, since-as-filter needs git 2.37+
        # which ubuntu-latest provides); newer versions guard against regressions.
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show tool versions
        run: |
          python --version
          git --version

      - name: Byte-compile all scripts
        run: python -m py_compile repo_worklog/scripts/*.py

      - name: Smoke-test each script CLI (--help)
        run: |
          for s in repo_worklog/scripts/*.py; do
            case "$s" in
              *worklog_markers.py) continue ;;  # shared module, no CLI
            esac
            echo "checking $s"
            python "$s" --help > /dev/null
          done

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
