name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the documented floor (zoneinfo, since-as-filter needs git 2.37+
        # which ubuntu-latest provides); newer versions guard against regressions.
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show tool versions
        run: |
          python --version
          git --version

      - name: Byte-compile the package and scripts
        run: |
          python -m compileall -q git-worklog/git_worklog
          python -m py_compile git-worklog/scripts/*.py

      - name: Smoke-test each script CLI (--help)
        run: |
          for s in git-worklog/scripts/*.py; do
            case "$s" in
              */_*.py) continue ;;              # bootstrap helper, no CLI
              *worklog_markers.py) continue ;;  # shared module, no CLI
            esac
            echo "checking $s"
            python "$s" --help > /dev/null
          done

      # The skill is installed by copying a directory, so the engine must import
      # with nothing installed and nothing on PATH but the skill root itself.
      - name: Smoke-test the CLI with no install
        env:
          PYTHONPATH: git-worklog
        run: |
          python -m git_worklog --help > /dev/null
          python -m git_worklog version
          python -m git_worklog --text doctor || true   # warnings are not failures here
          python -m git_worklog validate --dir .git-worklog

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  package:
    # Packaging breaks quietly and only at install time, so build and install it
    # for real rather than trusting pyproject to be right.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install from source
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: The console entry point works and agrees with the package
        run: |
          cd "$(mktemp -d)"          # not the source tree: prove it is installed
          git-worklog --version
          git-worklog version
          test "$(git-worklog --version)" = "git-worklog $(python -c 'import git_worklog; print(git_worklog.__version__)')"

      # provider_models.json is package data, and package data is exactly the
      # kind of thing that silently stops shipping. An installed CLI with no
      # model to resolve fails only when someone asks it for one.
      - name: The installed package carries provider_models.json
        run: |
          cd "$(mktemp -d)"          # not the source tree: prove it is installed
          python -c "
          import os
          from git_worklog import providers
          p = providers.default_config_path()
          assert os.path.isfile(p), f'provider_models.json not installed at {p}'
          r = providers.resolve(host='anthropic')
          assert r['model']['model_id'], 'installed config resolved no model id'
          print('resolved', r['model']['model_id'], 'from', r['model_id_source'])
          "

  skill-zip:
    # The other job proves `pip install` works. This proves the other way in --
    # unzip and use, with nothing installed -- which is how the skill is actually
    # distributed, and the property the whole layout is arranged to protect.
    # A broken zip is invisible until a release, so build it on every PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build the archive
        run: python tools/build_skill_zip.py

      - name: The unzipped skill runs with nothing installed
        run: |
          dest="$(mktemp -d)"
          unzip -q skill.zip -d "$dest"
          # The directory name IS the command name in Claude Code, so this is a
          # contract, not cosmetics.
          test -d "$dest/git-worklog" || { echo "did not unzip to git-worklog/"; exit 1; }
          cd "$dest/git-worklog"
          # No PYTHONPATH, no pip install: exactly what a user gets.
          python -m git_worklog version
          python -m git_worklog --help > /dev/null
          python -c "
          import sys; sys.path.insert(0, '.')
          from git_worklog import providers
          r = providers.resolve(host='anthropic')
          assert r['model']['model_id'], 'packaged config resolved no model id'
          print('resolved', r['model']['model_id'], 'from the unzipped skill')
          "
